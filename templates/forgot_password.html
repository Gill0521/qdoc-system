<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password | Q-DOC</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.7.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css?v=25">
</head>
<body class="login-page d-flex align-items-center justify-content-center bg-primary">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="login-card p-4 shadow-sm rounded-4 bg-white">
                    <h3 class="fw-bold mb-1"><i class="ri-lock-password-fill"></i> Reset Password</h3>
                    <p class="text-muted mb-4">Enter your registered email to receive an OTP.</p>

                    <div id="responseMessage"></div>

                    <form id="forgotForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold">EMAIL ADDRESS</label>
                            <input type="email" class="form-control" id="resetEmail" required placeholder="example@mail.com">
                        </div>
                        <button type="button" class="btn btn-primary w-100" id="sendCodeBtn">SEND RESET CODE</button>
                    </form>

                    <div id="newPasswordSection" class="d-none mt-3">
                        <hr>
                        <div class="mb-3">
                            <label class="form-label fw-bold">NEW PASSWORD</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="ri-lock-line"></i></span>
                                <input type="password" class="form-control" id="newPwd" placeholder="Minimum 8 characters">
                                <span class="input-group-text">
                                    <i class="ri-eye-line toggle-password" data-target="newPwd" style="cursor:pointer;"></i>
                                </span>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">CONFIRM NEW PASSWORD</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="ri-lock-line"></i></span>
                                <input type="password" class="form-control" id="confirmPwd" placeholder="Repeat password">
                                <span class="input-group-text">
                                    <i class="ri-eye-line toggle-password" data-target="confirmPwd" style="cursor:pointer;"></i>
                                </span>
                            </div>
                        </div>
                        <button type="button" class="btn btn-success w-100" id="savePasswordBtn">UPDATE PASSWORD</button>
                    </div>
                    <p class="text-center mt-3"><a href="login.php" class="text-decoration-none">Back to Login</a></p>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="verificationModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-4 text-center">
                <h2 class="fw-bold">Verify It's You</h2>
                <div id="modalMessage"></div>
                <p id="maskedEmailInfo" class="text-muted"></p>
                <div class="d-flex justify-content-center gap-2 my-3">
                    
                        <input type="text" maxlength="1" class="verify-code form-control text-center fs-4" style="width:50px;" id="v{{ i }}">
                    
                </div>
                <button class="btn btn-success w-100" id="verifyBtn">VERIFY OTP</button>
                <button type="button" class="btn btn-link mt-2" data-bs-dismiss="modal">Cancel</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const responseMessage = document.getElementById('responseMessage');
            const modalMessage = document.getElementById('modalMessage');
            const verificationModal = new bootstrap.Modal(document.getElementById("verificationModal"));

            function showMsg(container, message, type = 'danger') {
                const icon = type === 'success' ? 'ri-checkbox-circle-fill' : 'ri-error-warning-fill';
                container.innerHTML = `
                    <div class="alert alert-${type} alert-dismissible fade show border-0 shadow-sm" role="alert">
                        <i class="${icon} me-2"></i> ${message}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>`;
            }

            // STAGE 1: SEND CODE
            document.getElementById('sendCodeBtn').addEventListener('click', function() {
                const email = document.getElementById('resetEmail').value.trim();
                if(!email) return showMsg(responseMessage, "Please enter your email.");

                const btn = this;
                btn.disabled = true;
                btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>SENDING...`;

                fetch("forgot_process.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: "email=" + encodeURIComponent(email)
                })
                .then(r => r.json())
                .then(data => {
                    btn.disabled = false; btn.innerText = "SEND RESET CODE";
                    if(data.status === "success") {
                        document.getElementById("maskedEmailInfo").innerHTML = `Code sent to <strong>${data.masked_email}</strong>`;
                        verificationModal.show();
                    } else { showMsg(responseMessage, data.message); }
                }).catch(() => { btn.disabled = false; showMsg(responseMessage, "Network error."); });
            });

            // STAGE 2: VERIFY OTP
            document.getElementById('verifyBtn').addEventListener('click', function() {
                let code = "";
                document.querySelectorAll(".verify-code").forEach(box => code += box.value);
                
                fetch("verify_reset_otp.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: "code=" + code
                })
                .then(r => r.json())
                .then(data => {
                    if(data.status === "success") {
                        verificationModal.hide();
                        document.getElementById('forgotForm').classList.add('d-none');
                        document.getElementById('newPasswordSection').classList.remove('d-none');
                        showMsg(responseMessage, "Code verified! Enter your new password.", "success");
                    } else { showMsg(modalMessage, data.message); }
                });
            });

            // STAGE 3: UPDATE PASSWORD
            document.getElementById('savePasswordBtn').addEventListener('click', function() {
                const pwd = document.getElementById('newPwd').value;
                const cpwd = document.getElementById('confirmPwd').value;
                if(pwd.length < 8) return showMsg(responseMessage, "Password must be 8+ characters.");
                if(pwd !== cpwd) return showMsg(responseMessage, "Passwords do not match.");

                fetch("update_password_final.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: "password=" + encodeURIComponent(pwd)
                })
                .then(r => r.json())
                .then(data => {
                    if(data.status === "success") {
                        showMsg(responseMessage, "Success! Redirecting to login...", "success");
                        setTimeout(() => window.location.href = "login.php", 2000);
                    } else { showMsg(responseMessage, data.message); }
                });
            });

            // --- PASSWORD TOGGLE VISIBILITY ---
            const toggleIcons = document.querySelectorAll('.toggle-password');

            toggleIcons.forEach(icon => {
                icon.addEventListener('click', function() {
                    // Get the target input ID from the data-target attribute
                    const targetId = this.getAttribute('data-target');
                    const passwordInput = document.getElementById(targetId);
                    
                    // Toggle the type attribute
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    
                    // Toggle the eye / eye-off icon
                    this.classList.toggle('ri-eye-line');
                    this.classList.toggle('ri-eye-off-line');
                });
            });

            // OTP Input Focusing
            const boxes = document.querySelectorAll(".verify-code");
            boxes.forEach((box, i) => {
                box.oninput = () => { if(box.value && i < 5) boxes[i+1].focus(); };
                box.onkeydown = (e) => { if(e.key === 'Backspace' && !box.value && i > 0) boxes[i-1].focus(); };
            });
        });
    </script>
</body>
</html>
