<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-DOC Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.7.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css?v=25">
</head>
<body>

<div class="login-page d-flex align-items-center justify-content-center">
    <div class="container">
        <div class="row gx-5">
            <div class="col-lg-6 text-white d-flex flex-column justify-content-center mb-5 mb-lg-0">
                <h1 class="text-white display-2 fw-bold">Welcome to</h1>
                <h1 class="text-yellow display-2 fw-bold">Q-DOC Portal</h1>
                <p class="lead mt-0">Sign in and request your documents today.</p>
            </div>
            
            <div class="col-lg-6">
                <div class="login-card p-4 shadow-sm rounded-4 bg-white">
                    <h3 class="fw-bold mb-1"><i class="ri-account-circle-fill"></i> Log In</h3>
                    <p class="text-muted mb-4">Enter your credentials to continue.</p>
                    {% include '_flash.html' %}

                    <form action="login_process.php" method="POST" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label fw-bold">LOGIN AS</label>
                            <div class="btn-group w-100" role="group">
                                <input type="radio" class="btn-check" name="role" id="resident" value="Resident" checked>
                                <label class="btn btn-outline-primary" for="resident"><i class="ri-home-4-line"></i> Resident</label>

                                <input type="radio" class="btn-check" name="role" id="official" value="Official">
                                <label class="btn btn-outline-primary" for="official"><i class="ri-user-line"></i> Official</label>

                                <input type="radio" class="btn-check" name="role" id="admin" value="Admin">
                                <label class="btn btn-outline-primary" for="admin"><i class="ri-shield-line"></i> Admin</label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">EMAIL ADDRESS<span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="ri-mail-line"></i></span>
                                <input type="email" class="form-control" name="email" placeholder="Email Address" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">PASSWORD <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="ri-lock-line"></i></span>
                                <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                                <span class="input-group-text">
                                    <i class="ri-eye-off-line" id="togglePassword" style="cursor:pointer;"></i>
                                </span>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div class="form-check mb-0">
                                <input type="checkbox" class="form-check-input" id="rememberme" name="rememberme">
                                <label class="form-check-label" for="rememberme">
                                    Remember Me
                                </label>
                            </div>

                            <a href="forgot_password.php" class="text-primary" style="text-decoration: none;">
                                Forgot Password?
                            </a>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mt-3" id="loginBtn">Login</button>
                        <p class="text-center mt-3">Don't have an account? <a href="register.php">Register here</a></p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>
const loginBtn = document.getElementById('loginBtn');
const roleRadios = document.querySelectorAll('input[name="role"]');

roleRadios.forEach(radio => {
    radio.addEventListener('change', () => {
        loginBtn.textContent = `Login as ${radio.value}`;
    });
});

//initialize button text based on default checked radio
const checkedRadio = document.querySelector('input[name="role"]:checked');
if(checkedRadio){
    loginBtn.textContent = `Login as ${checkedRadio.value}`;
}
</script>

<script>
const togglePassword = document.getElementById('togglePassword');
const password = document.getElementById('password');

togglePassword.addEventListener('click', () => {
    if (password.type === 'password') {
        password.type = 'text';

        togglePassword.classList.remove('ri-eye-off-line');
        togglePassword.classList.add('ri-eye-line');
    } else {
        password.type = 'password';

        togglePassword.classList.remove('ri-eye-line');
        togglePassword.classList.add('ri-eye-off-line');
    }
});
</script>
</body>
</html>
