<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Profile | Q-DOC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { background-color: #F4F7FA; font-family: 'Poppins', sans-serif; }
        .profile-container { max-width: 550px; margin: 50px auto; }
        
        .avatar-wrapper {
            width: 110px; height: 110px; margin: 0 auto 20px; position: relative;
        }
        
        .avatar-circle {
            width: 100%; height: 100%; background: #0A3E9F; color: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: bold;
            box-shadow: 0 4px 15px rgba(10, 62, 159, 0.3);
            border: 4px solid white;
        }
        
        .avatar-img {
            width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 4px solid white;
        }

        .card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .info-label { font-size: 0.75rem; font-weight: 700; color: #6c757d; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
        .form-control { border-radius: 10px; padding: 10px 15px; font-size: 0.95rem; }
        .form-control:focus { border-color: #0A3E9F; box-shadow: 0 0 0 4px rgba(10, 62, 159, 0.1); }
        
        .otp-input { letter-spacing: 12px; font-size: 28px; text-align: center; font-weight: bold; border: 2px solid #e2e8f0; }
        .otp-input:focus { border-color: #0A3E9F; }
    </style>
</head>
<body>

    <div class="container profile-container">
        <a href="dashboard_admin.php" class="btn btn-sm btn-link text-decoration-none text-muted mb-3 p-0 fw-medium">
            <i class="ri-arrow-left-line me-1"></i> Back to Dashboard
        </a>

        <div class="card p-4 text-center mb-4">
            <div class="avatar-wrapper">
                
                    {% if db_pic %}
                    <img src="{{ db_pic }}" class="avatar-img" alt="Profile">
                
                    {% else %}
                    <div class="avatar-circle">{{ initials }}</div>
                    {% endif %}
                
            </div>
            
            <h3 class="fw-bold mb-0 text-dark">{{ user.fullname }}</h3>
            <span class="badge bg-primary-subtle text-primary px-3 py-2 mt-2 rounded-pill">
                {{ '' }}
            </span>
        </div>

        <div class="card p-4">
            <form id="profileForm">
                <div class="row">
                    <div class="col-md-6 mb-3 text-start">
                        <label class="info-label">Full Name</label>
                        <input type="text" class="form-control bg-light border-0 fw-bold text-secondary" value="{{ user.fullname }}" readonly>
                    </div>
                    <div class="col-md-6 mb-3 text-start">
                        <label class="info-label">Position/Role</label>
                        <input type="text" class="form-control bg-light border-0 fw-bold text-secondary" value="{{ '' }}" readonly>
                    </div>
                </div>

                <div class="mb-3 text-start">
                    <label class="info-label">Email Address</label>
                    <input type="email" name="email" class="form-control" value="{{ user.email }}" required>
                </div>
                
                <div class="mb-3 text-start">
                    <label class="info-label">New Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Leave blank to keep current">
                </div>
                
                <div class="mb-4 text-start">
                    <label class="info-label">Confirm New Password</label>
                    <input type="password" name="confirm_password" class="form-control" placeholder="Confirm new password">
                </div>
                
                <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm rounded-3">
                    Update Admin Profile
                </button>
            </form>
        </div>
    </div>

    <div class="modal fade" id="otpModal" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-body p-5 text-center">
                    <div class="mb-3">
                        <div style="width: 80px; height: 80px; background: #e0f2fe; color: #0A3E9F; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto;">
                            <i class="ri-shield-check-line" style="font-size: 2.5rem;"></i>
                        </div>
                    </div>
                    <h4 class="fw-bold">Security Verification</h4>
                    <p class="text-muted small">Enter the 6-digit code sent to <br><span id="maskedEmail" class="fw-bold text-dark"></span></p>
                    
                    <input type="text" id="otp_code" class="form-control otp-input mb-4" maxlength="6" placeholder="------">
                    
                    <button onclick="verifyCode()" class="btn btn-primary w-100 fw-bold py-2 rounded-3">Verify & Update</button>
                    
                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <button type="button" class="btn btn-sm text-muted" data-bs-dismiss="modal">Cancel</button>
                        <button onclick="resendCode()" class="btn btn-link btn-sm text-decoration-none fw-bold">Resend Code</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const otpModal = new bootstrap.Modal(document.getElementById('otpModal'));

        document.getElementById('profileForm').onsubmit = function(e) {
            e.preventDefault();
        
            // Get values for validation
            const email = this.querySelector('input[name="email"]').value;
            const password = this.querySelector('input[name="password"]').value;
            const confirmPassword = this.querySelector('input[name="confirm_password"]') ? this.querySelector('input[name="confirm_password"]').value : password;

            // --- 1. EMAIL VALIDATION ---
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email.trim())) {
                Swal.fire('Error', 'Please enter a valid email address.', 'error');
                return;
            }

            // --- 2. PASSWORD VALIDATION ---
            if (password.length > 0) {
                const strongPwd = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;
                if (!strongPwd.test(password)) {
                    Swal.fire('Weak Password', 'Password must be 8+ characters, with Upper, Lower, Number & Special character.', 'error');
                    return;
                }

                if (password !== confirmPassword) {
                    Swal.fire('Error', 'Passwords do not match!', 'error');
                    return;
                }
            }

            // --- 3. SEND OTP ---
            const formData = new FormData(this);
            Swal.fire({ title: 'Sending OTP...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            fetch('send_profile_otp.php', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                Swal.close();
                if(data.status === 'success') {
                    document.getElementById('maskedEmail').innerText = data.masked_email;
                    otpModal.show();
                } else {
                    Swal.fire('Error', data.message, 'error');
                }
            });
        };

        function verifyCode() {
            const code = document.getElementById('otp_code').value;
            const formData = new FormData();
            formData.append('code', code);

            fetch('verify_profile_update.php', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    Swal.fire({
                        title: 'Success!',
                        text: 'Profile updated successfully.',
                        icon: 'success',
                        confirmButtonColor: '#0A3E9F'
                    }).then(() => location.reload());
                } else {
                    Swal.fire('Error', data.message, 'error');
                }
            });
        }

        function resendCode() {
            fetch('resend_profile_code.php').then(res => res.json()).then(data => {
                if(data.status === 'success') Swal.fire('Sent', 'New code sent to your email.', 'success');
            });
        }
    </script>
    <script>
        // Check account status every 5 seconds (Security Feature)
        setInterval(function() {
            fetch('check_status.php')
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'logged_out') {
                        window.location.href = 'login.php';
                    }
                })
                .catch(error => console.error('Error checking status:', error));
        }, 5000); 
    </script>
</body>
</html>
