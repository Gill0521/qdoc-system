<script>
const noteModal = new bootstrap.Modal(document.getElementById('noteModal'));

document.addEventListener('DOMContentLoaded', () => {
    fetchRequests();
    document.getElementById('searchReq').addEventListener('keyup', (e) => fetchRequests(e.target.value));
});

function fetchRequests(query = '') {
    const tbody = document.getElementById('reqTableBody');
    tbody.innerHTML = '';
    document.getElementById('loader').classList.remove('d-none');

    fetch(`fetch_requests.php?search=${query}`)
        .then(res => res.json())
        .then(data => {
            document.getElementById('loader').classList.add('d-none');
            
            if(data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center p-4 text-muted">No records found.</td></tr>';
                return;
            }

            data.forEach(row => {
                let reqCode = `BRGY-${new Date().getFullYear()}-${String(row.id).padStart(5, '0')}`;
                
                // 1. DYNAMIC STATUS BADGE
                let badgeClass = 'badge-pending';
                if(row.status === 'Approved') badgeClass = 'badge-approved';
                if(row.status === 'Processing') badgeClass = 'badge-processing';
                if(row.status === 'Ready for Pickup') badgeClass = 'badge-ready';
                if(row.status === 'Completed') badgeClass = 'badge-completed';
                if(row.status === 'Rejected') badgeClass = 'badge-rejected';
                
                let statusBadge = `<span class="badge-status ${badgeClass}">${row.status}</span>`;

                // 2. PAYMENT BADGE
                let payClass = row.payment_status === 'Paid' ? 'badge-paid' : 'badge-unpaid';
                let payBadge = `<span class="${payClass}">${row.payment_status.toUpperCase()}</span>`;

                // 3. SMART NEXT STEP BUTTON
                let nextStepBtn = '';
                if(row.status === 'Pending') {
                    nextStepBtn = `<button onclick="updateStatus(${row.id}, 'Approved')" class="btn btn-primary btn-next-step text-white"><i class="ri-check-line me-1"></i> Approve</button>`;
                } else if(row.status === 'Approved') {
                    nextStepBtn = `<button onclick="updateStatus(${row.id}, 'Processing')" class="btn btn-info btn-next-step text-white"><i class="ri-loader-4-line me-1"></i> Process</button>`;
                } else if(row.status === 'Processing') {
                    nextStepBtn = `<button onclick="updateStatus(${row.id}, 'Ready for Pickup')" class="btn btn-warning btn-next-step text-dark"><i class="ri-notification-3-line me-1"></i> Ready</button>`;
                } else if(row.status === 'Ready for Pickup') {
                    nextStepBtn = `<button onclick="updateStatus(${row.id}, 'Completed')" class="btn btn-success btn-next-step text-white"><i class="ri-checkbox-circle-line me-1"></i> Complete</button>`;
                } else if(row.status === 'Completed') {
                    nextStepBtn = `<span class="text-muted small fw-bold"><i class="ri-checkbox-circle-fill text-success"></i> Done</span>`;
                } else {
                    nextStepBtn = `<span class="text-danger small fw-bold">Rejected</span>`;
                }

                tbody.innerHTML += `
                    <tr>
                        <td class="fw-bold text-primary">${reqCode}</td>
                        <td class="fw-bold">${row.fullname}</td>
                        <td>${row.document_type}</td>
                        <td>${row.formatted_pickup_date}</td>
                        <td class="text-center clickable" onclick="togglePayment(${row.id}, '${row.payment_status}')" style="cursor:pointer">${payBadge}</td>
                        <td class="text-center">${statusBadge}</td>
                        <td>${nextStepBtn}</td>
                        <td class="text-end">
                            <button class="btn-icon btn-primary text-primary" title="View Details" onclick='openView(${JSON.stringify(row)})'>
                                <i class="ri-eye-line"></i>
                            </button>

                            <button class="btn-icon btn-print" title="Print" onclick="printDoc(${row.id})">
                                <i class="ri-printer-line"></i>
                            </button>
                            
                            <button class="btn-icon btn-note" title="Notes" onclick="openNote(${row.id}, '${row.official_notes || ''}')">
                                <i class="ri-message-2-line"></i>
                            </button>
                            
                            ${row.status === 'Pending' ? `<button class="btn-icon text-danger" title="Reject" onclick="updateStatus(${row.id}, 'Rejected')"><i class="ri-close-line"></i></button>` : ''}
                        </td>
                    </tr>
                `;
            });
        });
}

function updateStatus(id, newStatus) {
    let confirmText = `Move status to "${newStatus}"?`;
    let confirmBtn = 'Yes, Update';
    let confirmColor = '#0A3E9F';

    if(newStatus === 'Rejected') {
        confirmText = "Are you sure you want to REJECT this request?";
        confirmBtn = "Yes, Reject";
        confirmColor = "#dc3545";
    }

    Swal.fire({
        title: 'Update Status?',
        text: confirmText,
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: confirmBtn,
        confirmButtonColor: confirmColor
    }).then((res) => {
        if(res.isConfirmed) sendAction(id, 'update_status', newStatus);
    });
}

function togglePayment(id, currentStatus) {
    let newStatus = currentStatus === 'Paid' ? 'Unpaid' : 'Paid';
    sendAction(id, 'toggle_payment', newStatus);
}

function openView(data) {
    document.getElementById('m-id').value = data.id;
    document.getElementById('m-name').textContent = data.fullname;
    document.getElementById('m-contact').textContent = data.contact || 'No contact';
    document.getElementById('m-doc').textContent = data.document_type;
    document.getElementById('m-pickup').textContent = data.formatted_pickup_date;
    document.getElementById('m-purpose').textContent = data.purpose;
    
    // Handle Payment Details Display
    document.getElementById('m-method').textContent = data.payment_method;
    document.getElementById('m-ref').textContent = data.payment_reference || 'N/A';

    const reqContainer = document.getElementById('m-req-container');
    reqContainer.innerHTML = '';

    if (data.requirement_file && data.requirement_file.trim() !== "") {
        const files = data.requirement_file.split(',');

        files.forEach(filePath => {
            const cleanPath = filePath.trim();

            reqContainer.innerHTML += `
                <img src="${cleanPath}"
                    onclick="previewRequirement('${cleanPath}')"
                    class="rounded border shadow-sm"
                    style="width:100px;height:100px;object-fit:cover;cursor:pointer;"
                    title="Click to preview"
                    loading="lazy"
                    referrerpolicy="no-referrer"
                    onerror="this.style.display='none'">
            `;
        });
    } else {
        reqContainer.innerHTML = '<div class="text-muted small">No requirements submitted</div>';
    }


    // Show the modal
    const viewModal = new bootstrap.Modal(document.getElementById('viewModal'));
    viewModal.show();
}

function previewRequirement(imgPath) {
    document.getElementById('previewImage').src = imgPath;
    new bootstrap.Modal(document.getElementById('filePreviewModal')).show();
}


function openNote(id, currentNote) {
    document.getElementById('noteId').value = id;
    document.getElementById('noteText').value = currentNote;
    noteModal.show();
}

function saveNote() {
    let id = document.getElementById('noteId').value;
    let note = document.getElementById('noteText').value;
    sendAction(id, 'save_note', note);
    noteModal.hide();
}

function printDoc(id) {
    window.open(`print_document.php?id=${id}`, '_blank');
}

function sendAction(id, action, payload = '') {
    const formData = new FormData();
    formData.append('id', id);
    formData.append('action', action);
    formData.append('payload', payload);

    fetch('request_actions.php', { method: 'POST', body: formData })
    .then(res => res.json())
    .then(data => {
        if(data.status === 'success') {
            const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3000 });
            Toast.fire({ icon: 'success', title: data.message });
            fetchRequests();
        } else {
            Swal.fire('Error', data.message, 'error');
        }
    });
}
</script>
<script>
    // Check account status every 5 seconds
    setInterval(function() {
        fetch('check_status.php')
            .then(response => response.json())
            .then(data => {
                
                // 1. Handle REJECTED Users
                if (data.status === 'Rejected') {
                    if (data.role === 'Resident') {
                        // Residents go to Pending Page
                        window.location.href = 'pending_status.php'; 
                    } else {
                        // Officials go to Access Denied Page
                        window.location.href = 'access_denied.php'; 
                    }
                } 
                
                // 2. Handle LOGGED OUT Users
                else if (data.status === 'logged_out') {
                    window.location.href = 'login.php';
                }
                
            })
            .catch(error => console.error('Error checking status:', error));
    }, 5000); 
</script>
